<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Akka Road Dashboard</title><link rel="stylesheet" href="/admin/admin.css"></head>
<body><div id="setupNotice" class="setup-notice" hidden><strong>One setup step remains:</strong> connect Supabase in <code>supabase-config.js</code>.</div>
<section id="authView" class="auth-shell"><div class="auth-card"><img src="/assets/akka-road-logo.svg" alt="Akka Road"><p class="eyebrow">Private dashboard</p><h1>Akka Road</h1><p>Sign in to manage the website.</p><form id="loginForm"><label>Email<input type="email" id="email" required autocomplete="email"></label><label>Password<input type="password" id="password" required autocomplete="current-password"></label><button>Sign in</button><p id="authMessage" class="message"></p></form></div></section>
<div id="appView" class="app" hidden><aside><div class="brand"><img src="/assets/akka-road-logo.svg"><span>Akka Road</span></div><nav id="nav"><button data-view="overview" class="active">Overview</button><button data-view="settings">Website</button><button data-view="members">Band Members</button><button data-view="posts">News</button><button data-view="releases">Music</button><button data-view="events">Shows</button><button data-view="media">Media</button></nav><button id="signOut" class="signout">Sign out</button></aside><main><header><div><p class="eyebrow">Private dashboard</p><h1 id="pageTitle">Overview</h1></div><a href="/" target="_blank">View website ↗</a></header><div id="content"></div></main></div>
<script type="module" src="/admin/admin.js"></script></body></html>
